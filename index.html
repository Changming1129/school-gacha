<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校園升學祈福 - 專屬扭蛋機</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');

        body {
            font-family: 'Noto Sans TC', sans-serif;
            /* 溫暖的祈福背景，防止大屏出現滾動條 */
            background: radial-gradient(circle at center, #fff0f5 0%, #ffd1dc 100%);
            overflow: hidden; 
            user-select: none; /* 防止觸控螢幕反白文字 */
            -webkit-user-select: none;
        }

        /* --- 扭蛋機立體質感 CSS --- */
        .glass-dome {
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.1) 60%, rgba(0,0,0,0.1) 100%);
            box-shadow: inset -10px -10px 40px rgba(0,0,0,0.1), 0 10px 20px rgba(0,0,0,0.1);
        }
        
        .machine-base {
            background: linear-gradient(to right, #e0e0e0 0%, #ffffff 20%, #ffffff 80%, #e0e0e0 100%);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .silver-trim {
            background: linear-gradient(to bottom, #d4d4d4 0%, #f5f5f5 40%, #a3a3a3 100%);
            border-top: 2px solid #fff;
            border-bottom: 2px solid #888;
        }

        .chute {
            background: linear-gradient(to bottom, #333 0%, #666 10%);
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.5);
        }

        .chute-flap {
            background: linear-gradient(to bottom, #f5f5f5 0%, #a3a3a3 100%);
            transform-origin: top;
            transition: transform 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* 扭蛋球的立體感 */
        .capsule {
            border-radius: 50%;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.2), inset 5px 5px 15px rgba(255,255,255,0.6), 0 2px 5px rgba(0,0,0,0.3);
            position: absolute;
        }

        /* 旋鈕 */
        .knob-container {
            background: linear-gradient(135deg, #e0e0e0, #999);
            box-shadow: 0 5px 10px rgba(0,0,0,0.2), inset 0 2px 2px #fff;
        }
        .knob-handle {
            background: linear-gradient(to right, #ccc, #fff, #ccc);
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* --- 動畫設定 --- */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-2px, -1px) rotate(-2deg); }
            40% { transform: translate(-1px, 2px) rotate(1deg); }
            60% { transform: translate(2px, 1px) rotate(0deg); }
            80% { transform: translate(1px, -2px) rotate(2deg); }
            100% { transform: translate(-1px, -1px) rotate(-1deg); }
        }

        @keyframes dropDown {
            0% { transform: translateY(-100px) scale(0.5); opacity: 0; }
            50% { transform: translateY(20px) scale(1); opacity: 1; }
            70% { transform: translateY(-10px); }
            100% { transform: translateY(0); opacity: 1; }
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* --- 新增：對聯的直書樣式 --- */
        .vertical-rl {
            writing-mode: vertical-rl;
            text-orientation: upright;
        }

        .couplet-bg {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            border: 6px solid #facc15;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3), inset 0 0 15px rgba(0,0,0,0.4);
        }

        .animate-shake { animation: shake 0.3s infinite; }
        .animate-drop { animation: dropDown 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        .animate-pop { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>

            { title: "撥雲見日籤", desc: "辛苦的付出，即將迎來最明亮美好的陽光！", icon: "🌤️", themeClass: "border-teal-500 bg-teal-50", tagClass: "bg-teal-600", group: "🚀 第 6 組：未來藍圖篇" },

            { title: "乘風破浪籤", desc: "克服一切困難與挑戰，勇敢迎向光明的未來！", icon: "🏄", themeClass: "border-teal-500 bg-teal-50", tagClass: "bg-teal-600", group: "🚀 第 6 組：未來藍圖篇" },
            { title: "滿載而歸籤", desc: "帶走豐碩的知識與傲人的成績，大豐收！", icon: "🛒", themeClass: "border-teal-500 bg-teal-50", tagClass: "bg-teal-600", group: "🚀 第 6 組：未來藍圖篇" },
            { title: "夢想成真籤", desc: "宇宙聽見了你的願望，即將為你實現！", icon: "🕸️", themeClass: "border-teal-500 bg-teal-50", tagClass: "bg-teal-600", group: "🚀 第 6 組：未來藍圖篇" },
            { title: "無限可能籤", desc: "不要給自己設限，你的未來有著無限可能！", icon: "♾️", themeClass: "border-teal-500 bg-teal-50", tagClass: "bg-teal-600", group: "🚀 第 6 組：未來藍圖篇" },
            { title: "燦爛星空籤", desc: "閃耀吧！你就是夜空中最獨特、最閃亮的那顆星！", icon: "🔭", themeClass: "border-teal-500 bg-teal-50", tagClass: "bg-teal-600", group: "🚀 第 6 組：未來藍圖篇" },
            { title: "專屬幸運籤", desc: "這份幸運專屬於你，請充滿自信地大步前進吧！", icon: "🎁", themeClass: "border-teal-500 bg-teal-50", tagClass: "bg-teal-600", group: "🚀 第 6 組：未來藍圖篇" }
        ];

        // 扭蛋顏色清單 (粉彩馬卡龍色系，對應附圖)
        const pastelColors = [
            'bg-pink-300', 'bg-blue-300', 'bg-yellow-200', 
            'bg-green-300', 'bg-purple-300', 'bg-orange-300'
        ];

        // 分類群組對應邏輯 (對應前文的 6 大主題)
        function getGroupName(number) {
            if (number >= 1 && number <= 10) return "🏆 第 1 組：學神附體篇";
            if (number >= 11 && number <= 20) return "🍀 第 2 組：考場幸運篇";
            if (number >= 21 && number <= 30) return "💖 第 3 組：暖心充能篇";
            if (number >= 31 && number <= 40) return "🍍 第 4 組：台灣味諧音梗篇";
            if (number >= 41 && number <= 50) return "🎮 第 5 組：遊戲網路梗篇";
            if (number >= 51 && number <= 60) return "🚀 第 6 組：未來藍圖篇";
            return "神秘隱藏籤";
        }

        // 新增：取得扭蛋在玻璃圓頂內的隨機位置
        function getRandomDomePosition() {
            const angle = Math.random() * Math.PI * 2;
            const radius = Math.random() * 110; // 控制在圓頂內
            const x = 160 + radius * Math.cos(angle) - 32; // 160是圓心, 32是球半徑
            const y = 160 + radius * Math.sin(angle) - 32 + 20; // 稍微往下沉
            return { x, y };
        }

        // --- 2. 視覺初始化：填滿玻璃圓頂 ---
        const dome = document.getElementById('dome');
        const numVisualCapsules = 60; // 畫面上顯示的球數 (視覺效果)
        
        for (let i = 0; i < numVisualCapsules; i++) {
            const cap = document.createElement('div');
            const colorClass = pastelColors[Math.floor(Math.random() * pastelColors.length)];
            cap.className = `capsule w-16 h-16 ${colorClass} absolute inner-capsule`;
            
            // 隨機散佈在圓形範圍內
            const pos = getRandomDomePosition();
            cap.style.left = `${pos.x}px`;
            cap.style.top = `${pos.y}px`;
            // 隨機旋轉角度讓反光看起來不一致
            cap.style.transform = `rotate(${Math.random() * 360}deg)`; 
            
            dome.appendChild(cap);
        }

        // --- 3. 互動邏輯 ---
        const drawBtn = document.getElementById('draw-btn');
        const knob = document.getElementById('knob');
        const dispensedCapsule = document.getElementById('dispensed-capsule');
        const flap = document.getElementById('flap');
        const resultModal = document.getElementById('result-modal');
        
        // 抓取數位小卡的 DOM 元素
        const fortuneCard = document.getElementById('fortune-card');
        const cardNumTag = document.getElementById('card-number-tag');
        const cardIcon = document.getElementById('card-icon');
        const cardTitle = document.getElementById('card-title');
        const cardDesc = document.getElementById('card-desc');
        const cardInnerBorder = document.getElementById('card-inner-border');
        
        const remainCount = document.getElementById('remain-count');

        let isAnimating = false;

        drawBtn.addEventListener('click', () => {
            if (isAnimating) return;
            if (capsulePool.length === 0) {
                alert("扭蛋已經全數抽完囉！活動圓滿結束！");
                return;
            }

            isAnimating = true;
            drawBtn.classList.add('opacity-50', 'cursor-not-allowed');
            drawBtn.innerText = "轉動中...";

            // 隨機從池中抽取一個號碼並移除
            const randomIndex = Math.floor(Math.random() * capsulePool.length);
            const drawnNumber = capsulePool.splice(randomIndex, 1)[0];
            
            // 更新剩餘數量
            remainCount.innerText = capsulePool.length;

            // 步驟 A: 旋鈕轉動 & 圓頂內扭蛋滾動 (取代原本的原地小震動)
            knob.style.transform = 'rotate(720deg)'; // 轉兩圈
            
            document.querySelectorAll('.inner-capsule').forEach(cap => {
                // 開啟 CSS 過渡動畫，讓移動變平滑
                cap.style.transition = 'all 0.15s ease-out';
            });

            // 設定計時器，每 150 毫秒改變一次所有球的位置，產生攪拌滾動感
            const rollInterval = setInterval(() => {
                document.querySelectorAll('.inner-capsule').forEach(cap => {
                    const pos = getRandomDomePosition();
                    cap.style.left = `${pos.x}px`;
                    cap.style.top = `${pos.y}px`;
                    cap.style.transform = `rotate(${Math.random() * 360}deg)`;
                });
            }, 150);

            // 步驟 B: 旋轉結束後，扭蛋掉落
            setTimeout(() => {
                // 停止滾動
                clearInterval(rollInterval);
                
                // 關閉過渡動畫，避免球體跑位
                document.querySelectorAll('.inner-capsule').forEach(cap => {
                    cap.style.transition = 'none';
                });

                // 設定掉落的扭蛋顏色
                const randomColor = pastelColors[Math.floor(Math.random() * pastelColors.length)];
                dispensedCapsule.className = `w-14 h-14 capsule absolute bottom-2 z-20 ${randomColor} animate-drop`;
                dispensedCapsule.classList.remove('hidden');
                
                // 擋板微微打開的動畫
                flap.style.transform = 'rotateX(30deg)';

                // 步驟 C: 掉落後，彈出滿版開獎視窗
                setTimeout(() => {
                    flap.style.transform = 'rotateX(0deg)'; // 擋板蓋回
                    
                    // 設定開獎內容 (動態生成數位小卡)
                    const fortuneData = fortunesData[drawnNumber - 1]; // 陣列索引為 0~59
                    
                    // 更新卡片內容
                    cardNumTag.innerText = `#${drawnNumber.toString().padStart(2, '0')}`;
                    cardIcon.innerText = fortuneData.icon;
                    cardTitle.innerText = fortuneData.title;
                    cardDesc.innerText = fortuneData.desc;
                    
                    // 重置並套用卡片主題顏色
                    fortuneCard.className = `relative w-[90%] max-w-5xl aspect-[2/1] rounded-3xl flex items-center shadow-[0_20px_50px_rgba(0,0,0,0.5)] transition-colors duration-300 overflow-hidden border-[12px] bg-white cursor-default ${fortuneData.themeClass}`;
                    cardNumTag.className = `absolute top-0 left-0 text-white font-black px-10 py-4 rounded-br-3xl text-5xl shadow-md tracking-wider z-10 ${fortuneData.tagClass}`;
                    
                    // 提取邊框顏色應用於內框，還原印刷卡片的雙層邊框感
                    const borderColor = fortuneData.themeClass.split(' ').find(cls => cls.startsWith('border-'));
                    cardInnerBorder.className = `absolute inset-4 border-4 rounded-xl pointer-events-none opacity-40 ${borderColor}`;
                    
                    // 顯示視窗
                    resultModal.classList.remove('hidden');
                    resultModal.classList.add('animate-pop');

                }, 800); // 等待掉落動畫完成

            }, 1000); // 旋鈕轉動時間
        });

        // --- 4. 關閉視窗與重置 (改為全螢幕點擊關閉) ---
        window.closeModal = function() {
            resultModal.classList.add('hidden');
            resultModal.classList.remove('animate-pop');
            
            // 重置機器狀態
            dispensedCapsule.classList.add('hidden');
            dispensedCapsule.classList.remove('animate-drop');
            
            // 旋鈕無縫歸位
            knob.style.transition = 'none';
            knob.style.transform = 'rotate(0deg)';
            setTimeout(() => { knob.style.transition = 'transform 1s ease'; }, 50);

            // 恢復按鈕
            drawBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            drawBtn.innerText = "點擊抽取專屬祝福";
            isAnimating = false;
        };

    </script>
